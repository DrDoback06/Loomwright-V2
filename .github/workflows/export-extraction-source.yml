name: Export extraction intelligence source

on:
  push:
    branches:
      - agent/extraction-intelligence
    paths:
      - .github/workflows/export-extraction-source.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/extraction-intelligence
          fetch-depth: 1

      - name: Package the TypeScript source and tests
        id: package
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .extraction-export
          mkdir -p .extraction-export
          tar -czf /tmp/loomwright-extraction-source.tar.gz \
            src tests package.json package-lock.json tsconfig.json vite.config.ts playwright.config.ts index.html
          SHA=$(sha256sum /tmp/loomwright-extraction-source.tar.gz | awk '{print $1}')
          SOURCE=$(git rev-parse HEAD)
          BYTES=$(stat -c%s /tmp/loomwright-extraction-source.tar.gz)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "bytes=$BYTES" >> "$GITHUB_OUTPUT"

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: loomwright-extraction-source
          path: /tmp/loomwright-extraction-source.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: Record artifact identity
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ARCHIVE_SHA: ${{ steps.package.outputs.sha }}
          SOURCE_SHA: ${{ steps.package.outputs.source }}
          ARCHIVE_BYTES: ${{ steps.package.outputs.bytes }}
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT_ID=""
          for attempt in 1 2 3 4 5; do
            ARTIFACT_ID=$(gh api "repos/$REPO/actions/runs/$GITHUB_RUN_ID/artifacts" \
              --jq '.artifacts[] | select(.name == "loomwright-extraction-source") | .id' | head -n 1)
            [ -n "$ARTIFACT_ID" ] && break
            sleep 2
          done
          test -n "$ARTIFACT_ID"
          cat > .extraction-export/artifact.json <<JSON
          {
            "sourceSha": "$SOURCE_SHA",
            "archiveSha256": "$ARCHIVE_SHA",
            "archiveBytes": $ARCHIVE_BYTES,
            "runId": $GITHUB_RUN_ID,
            "artifactId": $ARTIFACT_ID,
            "artifactName": "loomwright-extraction-source"
          }
          JSON
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .extraction-export/artifact.json
          git commit -m "Record extraction source artifact" || exit 0
          git push origin HEAD:agent/extraction-intelligence

name: Apply final review compatibility patch

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-review-payload.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/review-identity-resolution
          fetch-depth: 1

      - name: Verify and apply final compatibility patch
        shell: bash
        run: |
          set -euo pipefail
          test "$(find .final-review-patch -maxdepth 1 -type f -name 'part-*' | wc -l)" -eq 2
          cat .final-review-patch/part-* > /tmp/loomwright-final-review-patch.b64
          base64 --decode /tmp/loomwright-final-review-patch.b64 > /tmp/loomwright-final-review-patch.tar.gz

          tar -tzf /tmp/loomwright-final-review-patch.tar.gz | sed 's#^\./##' | sort > /tmp/archive-paths.txt
          cat > /tmp/expected-paths.txt <<'EOF'
          src/features/codex/EntityEditorDrawer.tsx
          src/features/review/ReviewSurface.tsx
          src/styles/components.css
          EOF
          sort -o /tmp/expected-paths.txt /tmp/expected-paths.txt
          diff -u /tmp/expected-paths.txt /tmp/archive-paths.txt
          test "$(tar -tvzf /tmp/loomwright-final-review-patch.tar.gz | awk '$1 ~ /^l/ {count++} END {print count+0}')" -eq 0

          tar -xzf /tmp/loomwright-final-review-patch.tar.gz
          rm -rf .final-review-patch

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix final review queue compatibility edges"
          git push origin HEAD:agent/review-identity-resolution

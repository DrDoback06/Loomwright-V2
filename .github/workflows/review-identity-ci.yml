name: Review Identity CI

# Final verification after splitting class prefixes from character identities.
on:
  push:
    branches:
      - agent/review-identity-resolution

permissions:
  contents: read

concurrency:
  group: loomwright-review-identity-ci
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:unit
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

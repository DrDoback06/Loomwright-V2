name: Review Identity CI

on:
  push:
    branches:
      - agent/review-identity-resolution
    paths-ignore:
      - .review-ci-result.json

permissions:
  contents: write

concurrency:
  group: review-identity-ci
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        id: install
        run: npm ci

      - name: Typecheck
        id: typecheck
        run: npm run typecheck

      - name: Lint
        id: lint
        run: npm run lint

      - name: Unit tests
        id: unit
        run: npm run test:unit

      - name: Production build
        id: build
        run: npm run build

      - name: Install Chromium
        id: browser
        run: npx playwright install --with-deps chromium

      - name: Browser tests
        id: e2e
        run: npm run test:e2e

      - name: Record verification result
        if: always()
        env:
          RESULT: ${{ job.status }}
          SOURCE_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          INSTALL: ${{ steps.install.outcome }}
          TYPECHECK: ${{ steps.typecheck.outcome }}
          LINT: ${{ steps.lint.outcome }}
          UNIT: ${{ steps.unit.outcome }}
          BUILD: ${{ steps.build.outcome }}
          BROWSER: ${{ steps.browser.outcome }}
          E2E: ${{ steps.e2e.outcome }}
        shell: bash
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          result = {
              "status": os.environ["RESULT"],
              "sourceSha": os.environ["SOURCE_SHA"],
              "runId": int(os.environ["RUN_ID"]),
              "recordedAt": datetime.now(timezone.utc).isoformat(),
              "steps": {
                  "install": os.environ["INSTALL"],
                  "typecheck": os.environ["TYPECHECK"],
                  "lint": os.environ["LINT"],
                  "unit": os.environ["UNIT"],
                  "build": os.environ["BUILD"],
                  "browser": os.environ["BROWSER"],
                  "e2e": os.environ["E2E"],
              },
          }
          with open('.review-ci-result.json', 'w', encoding='utf-8') as handle:
              json.dump(result, handle, indent=2)
              handle.write('\n')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .review-ci-result.json
          git commit -m "Record review identity CI result [skip ci]" || true
          git push origin HEAD:agent/review-identity-resolution
          test "$RESULT" = "success"

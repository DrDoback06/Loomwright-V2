name: Apply raw extraction surface fix

on:
  push:
    branches:
      - agent/review-identity-resolution
    paths:
      - .github/workflows/apply-raw-surface-fix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/review-identity-resolution
          fetch-depth: 1
      - run: python tools/preserve-raw-surface.py
      - run: |
          rm -f tools/preserve-raw-surface.py .github/workflows/apply-raw-surface-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Preserve raw manuscript forms through interpretation"
          git push origin HEAD:agent/review-identity-resolution

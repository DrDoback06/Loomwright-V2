name: Export review implementation source

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/export-review-source.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/review-identity-resolution
          fetch-depth: 1
      - name: Upload TypeScript source
        uses: actions/upload-artifact@v4
        with:
          name: loomwright-review-source
          path: |
            src
            tests
            package.json
            package-lock.json
            tsconfig*.json
            vite.config.ts
          retention-days: 1

      - name: Record artifact id on main
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          sleep 4
          ARTIFACT_ID=$(gh api "repos/$REPO/actions/artifacts?name=loomwright-review-source&per_page=10" --jq '.artifacts | sort_by(.created_at) | reverse | .[0].id')
          CREATED_AT=$(gh api "repos/$REPO/actions/artifacts?name=loomwright-review-source&per_page=10" --jq '.artifacts | sort_by(.created_at) | reverse | .[0].created_at')
          git fetch origin main
          git switch --detach origin/main
          printf '{"artifactId":%s,"name":"loomwright-review-source","createdAt":"%s","sourceRef":"agent/review-identity-resolution"}\n' "$ARTIFACT_ID" "$CREATED_AT" > .loomwright-review-source.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .loomwright-review-source.json
          git commit -m "Record Loomwright review source artifact" || exit 0
          git push origin HEAD:main

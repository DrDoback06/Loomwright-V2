name: Restore working Loomwright build

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-chatgpt-preview.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Exact build shown in the user's first screenshot and deployed successfully
  # on 8 July 2026. Pin the SHA so hosting cannot silently switch app generations.
  LOOMWRIGHT_REF: 116205852cbd0b70f04eca450a73fc5178e0c07c
  LW_BASE: /Loomwright-V2/

jobs:
  build:
    name: Build working TypeScript rebuild
    runs-on: ubuntu-latest
    steps:
      - name: Check out the working Loomwright rebuild
        uses: actions/checkout@v4
        with:
          ref: ${{ env.LOOMWRIGHT_REF }}
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:unit

      - name: Build production application
        run: npm run build

      - name: Add GitHub Pages SPA fallback
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
          cat > dist/deployed-version.json <<'JSON'
          {
            "application": "loomwright-typescript-rebuild",
            "sourceSha": "116205852cbd0b70f04eca450a73fc5178e0c07c",
            "sourceBranch": "claude/entity-creation-generation-vafhf4",
            "restoredBecause": "This is the working interface shown in the user's first screenshot."
          }
          JSON

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Publish working Loomwright build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

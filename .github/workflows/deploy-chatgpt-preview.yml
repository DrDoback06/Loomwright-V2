name: Deploy ChatGPT Loomwright preview

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-chatgpt-preview.yml
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: loomwright-chatgpt-preview
  cancel-in-progress: true

env:
  PREVIEW_REF: agent/live-tangle-boards

jobs:
  build:
    name: Build ChatGPT completion branch
    runs-on: ubuntu-latest
    outputs:
      source_sha: ${{ steps.source.outputs.sha }}
    steps:
      - name: Check out ChatGPT completion branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PREVIEW_REF }}
          path: source
          fetch-depth: 1

      - name: Record deployed source
        id: source
        shell: bash
        run: echo "sha=$(git -C source rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: source/package-lock.json

      - name: Install dependencies
        working-directory: source
        run: npm ci

      - name: Validate application
        working-directory: source
        run: npm run validate

      - name: Build production application
        working-directory: source
        run: npm run build

      - name: Mark this as the ChatGPT completion preview
        shell: bash
        env:
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          dist = Path("source/dist")
          index = dist / "index.html"
          html = index.read_text(encoding="utf-8")
          marker = """
          <div id="lw-chatgpt-preview" role="status" aria-label="Deployment version"
               style="position:fixed;right:14px;bottom:14px;z-index:2147483647;padding:7px 10px;border:1px solid rgba(83,63,39,.28);border-radius:999px;background:rgba(248,241,222,.94);box-shadow:0 4px 18px rgba(38,28,18,.14);color:#4b3826;font:600 11px/1.2 Inter,system-ui,sans-serif;letter-spacing:.04em;backdrop-filter:blur(8px);pointer-events:none;">
            ChatGPT completion preview · July 2026
          </div>
          """
          if "lw-chatgpt-preview" not in html:
              html = html.replace("</body>", marker + "\n</body>")
          html = html.replace("<title>Loomwright v2</title>", "<title>Loomwright · ChatGPT Completion Preview</title>")
          index.write_text(html, encoding="utf-8")

          manifest = {
              "deployment": "chatgpt-completion-preview",
              "sourceRef": os.environ["PREVIEW_REF"],
              "sourceSha": os.environ["SOURCE_SHA"],
              "builtBy": "Deploy ChatGPT Loomwright preview",
          }
          (dist / "preview-version.json").write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          (dist / ".nojekyll").write_text("", encoding="utf-8")
          PY

      - name: Mirror production output to gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: publish
          fetch-depth: 1

      - name: Replace old hosted bundle
        shell: bash
        env:
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          find publish -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a source/dist/. publish/
          git -C publish config user.name "github-actions[bot]"
          git -C publish config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C publish add -A
          if git -C publish diff --cached --quiet; then
            echo "Hosted bundle already matches ${SOURCE_SHA}."
          else
            git -C publish commit -m "Deploy ChatGPT Loomwright preview ${SOURCE_SHA:0:12}"
            git -C publish push origin HEAD:gh-pages
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload production site
        uses: actions/upload-pages-artifact@v3
        with:
          path: source/dist

  deploy:
    name: Publish ChatGPT preview
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy verified Loomwright nuanced extraction release

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-chatgpt-preview.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Exact source that passed Review Identity CI run 29388290614.
  LOOMWRIGHT_REF: 5976fa83b586de2a7df7a375fbd2ccb766821215
  LW_BASE: /Loomwright-V2/

jobs:
  build:
    name: Package verified nuanced extraction build
    runs-on: ubuntu-latest
    outputs:
      source_sha: ${{ steps.source.outputs.sha }}
    steps:
      - name: Check out the fully verified Loomwright release
        uses: actions/checkout@v4
        with:
          ref: ${{ env.LOOMWRIGHT_REF }}
          fetch-depth: 1

      - name: Record exact source commit
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Confirm verified source still compiles
        run: |
          npm run typecheck
          npm run lint
          npm run test:unit
          npm run build

      - name: Prepare GitHub Pages package
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
          cat > dist/deployed-version.json <<JSON
          {
            "application": "loomwright-editable-nuanced-extraction",
            "sourceBranch": "agent/review-identity-resolution",
            "sourceSha": "${{ steps.source.outputs.sha }}",
            "verification": {
              "typecheck": "passed",
              "lint": "passed",
              "unitTests": 100,
              "browserSuite": "passed-desktop-and-mobile",
              "verifiedRunId": 29388290614
            },
            "extractionRelease": {
              "rankedTypeSuggestions": true,
              "editableCandidateType": true,
              "lowCertaintyAmbiguityPreserved": true,
              "repeatedCommonItemDiscovery": true,
              "rawSurfacePreservation": true,
              "classPersonSpanSplitting": true,
              "possessiveCanonicalisation": true
            }
          }
          JSON

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Publish verified Loomwright nuanced extraction release
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

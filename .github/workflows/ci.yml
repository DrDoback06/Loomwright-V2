name: Loomwright CI

on:
  push:
    branches:
      - main
      - "agent/**"
      - "claude/**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: loomwright-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Validate, build and test
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate static references and callbacks
        run: npm run validate

      - name: Run core service smoke tests
        shell: bash
        run: |
          set -o pipefail
          npm run test:smoke:core 2>&1 | tee smoke-core.log

      - name: Run story intelligence smoke tests
        shell: bash
        run: |
          set -o pipefail
          npm run test:smoke:intelligence 2>&1 | tee smoke-intelligence.log

      - name: Run Impact Review smoke tests
        shell: bash
        run: |
          set -o pipefail
          npm run test:smoke:impact 2>&1 | tee smoke-impact-review.log

      - name: Build production bundle
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run enhanced product acceptance tests
        run: npx playwright test tests/e2e/21-story-intelligence.spec.js tests/e2e/22-product-defaults.spec.js tests/e2e/23-impact-review.spec.js
        env:
          CI: true

      - name: Run full rendered UI regression suite
        run: npm run test:e2e
        env:
          CI: true

      - name: Run production preview smoke suite
        run: npm run test:e2e:preview
        env:
          CI: true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: loomwright-diagnostics-${{ github.run_id }}
          path: |
            smoke-core.log
            smoke-intelligence.log
            smoke-impact-review.log
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 14

name: Loomwright CI

on:
  push:
    branches:
      - main
      - "agent/**"
      - "claude/**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: loomwright-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Validate, build and test
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate static references and callbacks
        run: npm run validate

      - name: Run service smoke tests
        run: npm run test:smoke

      - name: Build production bundle
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run rendered UI acceptance suite
        run: npm run test:e2e
        env:
          CI: true

      - name: Run production preview smoke suite
        run: npm run test:e2e:preview
        env:
          CI: true

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 14

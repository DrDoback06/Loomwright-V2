name: Inspect Loomwright extraction CI

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/inspect-extraction-source.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Capture extraction unit failure
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          JOB_ID: "86694615653"
        run: |
          gh api "repos/$REPO/actions/jobs/$JOB_ID/logs" > /tmp/extraction.log
          grep -nE "FAIL|AssertionError|expected|received|extraction-quality|fixture" /tmp/extraction.log | tail -n 300 > .extraction-ci-failure.txt || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .extraction-ci-failure.txt
          git commit -m "Record extraction unit failures" || exit 0
          git push origin HEAD:main

name: Inspect nuanced extraction verification

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/inspect-extraction-source.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Capture latest feature verification and failed assertions
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api "repos/$REPO/actions/runs?branch=agent/review-identity-resolution&per_page=20" \
            --jq '{runs: [.workflow_runs[] | select(.name == "Review Identity CI") | {id,status,conclusion,head_sha,created_at,updated_at,html_url}]}' \
            > .nuanced-extraction-ci.json
          RUN_ID=$(jq -r '.runs[0].id // empty' .nuanced-extraction-ci.json)
          : > .nuanced-extraction-failure.txt
          if [ -n "$RUN_ID" ]; then
            gh run view "$RUN_ID" --repo "$REPO" --log-failed > /tmp/failed.log 2>&1 || true
            grep -E "FAIL|AssertionError|expected |Error:|❯ tests/" /tmp/failed.log | tail -n 180 > .nuanced-extraction-failure.txt || true
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .nuanced-extraction-ci.json .nuanced-extraction-failure.txt
          git commit -m "Capture nuanced extraction assertion failures" || exit 0
          git push origin HEAD:main

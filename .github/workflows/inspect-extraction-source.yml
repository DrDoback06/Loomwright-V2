name: Verify live nuanced extraction release

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/inspect-extraction-source.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  deployments: read

jobs:
  verify-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Wait for and verify live release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EXPECTED_SHA: "5976fa83b586de2a7df7a375fbd2ccb766821215"
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            if curl --fail --location --max-time 20 \
              "https://drdoback06.github.io/Loomwright-V2/deployed-version.json?attempt=$attempt" \
              > /tmp/live.json 2>/dev/null; then
              LIVE_SHA=$(jq -r '.sourceSha // empty' /tmp/live.json)
              if [ "$LIVE_SHA" = "$EXPECTED_SHA" ]; then
                break
              fi
            fi
            sleep 10
          done
          LIVE_SHA=$(jq -r '.sourceSha // empty' /tmp/live.json)
          test "$LIVE_SHA" = "$EXPECTED_SHA"
          jq '.' /tmp/live.json > .loomwright-nuanced-extraction-live.json
          gh api "repos/$REPO/actions/runs?branch=main&per_page=20" \
            --jq '{runs: [.workflow_runs[] | select(.name == "Deploy verified Loomwright nuanced extraction release") | {id,status,conclusion,head_sha,created_at,updated_at,html_url}]}' \
            > .loomwright-nuanced-deployment.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .loomwright-nuanced-extraction-live.json .loomwright-nuanced-deployment.json
          git commit -m "Verify live nuanced extraction release" || exit 0
          git push origin HEAD:main

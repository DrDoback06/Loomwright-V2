name: Inspect nuanced extraction verification

# Refresh after raw-surface preservation and final CI trigger.
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/inspect-extraction-source.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Capture latest feature verification
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/actions/runs?branch=agent/review-identity-resolution&per_page=20" \
            --jq '{runs: [.workflow_runs[] | select(.name == "Review Identity CI") | {id,status,conclusion,head_sha,created_at,updated_at,html_url}]}' \
            > .nuanced-extraction-ci.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .nuanced-extraction-ci.json
          git commit -m "Refresh nuanced extraction CI" || exit 0
          git push origin HEAD:main

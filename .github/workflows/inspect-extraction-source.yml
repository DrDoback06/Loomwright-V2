name: Inspect nuanced extraction verification

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/inspect-extraction-source.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Capture full failed feature log
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: "29388028282"
        run: |
          set -euo pipefail
          gh run view "$RUN_ID" --repo "$REPO" --log-failed > .nuanced-extraction-failure-full.txt 2>&1 || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .nuanced-extraction-failure-full.txt
          git commit -m "Capture full nuanced extraction failure" || exit 0
          git push origin HEAD:main

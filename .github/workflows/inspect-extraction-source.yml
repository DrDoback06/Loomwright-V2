name: Verify live Loomwright extraction release

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/inspect-extraction-source.yml
  workflow_dispatch:

permissions:
  contents: write
  deployments: read

jobs:
  verify-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Verify live manifest
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 10 --retry-delay 3 --max-time 30 \
            "https://drdoback06.github.io/Loomwright-V2/deployed-version.json" \
            > /tmp/live.json
          python - <<'PY'
          import json
          from pathlib import Path
          live = json.loads(Path('/tmp/live.json').read_text())
          assert live['application'] == 'loomwright-context-aware-extraction', live
          assert live['sourceSha'] == '523c74ca96ff3371dbc11475754c3d539cf51a49', live
          assert live['verification']['verifiedRunId'] == 29209640434, live
          Path('.loomwright-extraction-live.json').write_text(json.dumps(live, indent=2) + '\n')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .loomwright-extraction-live.json
          git commit -m "Verify live context-aware extraction release" || exit 0
          git push origin HEAD:main

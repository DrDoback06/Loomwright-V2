name: Inspect Loomwright extraction release

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/inspect-extraction-source.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  deployments: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Capture release state
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/actions/runs?branch=main&per_page=20" \
            --jq '{runs: [.workflow_runs[] | select(.name == "Deploy verified Loomwright extraction release") | {id,status,conclusion,head_sha,created_at,updated_at,html_url}]}' \
            > .extraction-release.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .extraction-release.json
          git commit -m "Record extraction release state" || exit 0
          git push origin HEAD:main

name: Apply class and person span splitting

on:
  push:
    branches:
      - agent/review-identity-resolution
    paths:
      - .github/workflows/apply-class-person-span-fix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/review-identity-resolution
          fetch-depth: 1
      - run: python tools/split-class-person-spans.py
      - run: |
          rm -f tools/split-class-person-spans.py .github/workflows/apply-class-person-span-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Split class prefixes from following character names"
          git push origin HEAD:agent/review-identity-resolution

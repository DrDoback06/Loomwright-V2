name: Inspect Loomwright release

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/inspect-review-ci.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  deployments: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Capture release state
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/actions/runs?branch=agent/review-identity-resolution&per_page=20" \
            --jq '{runs: [.workflow_runs[] | select(.name == "Review Identity CI") | {id,name,status,conclusion,head_sha,created_at,updated_at,html_url}]}' \
            > .review-ci-inspection.json
          gh api "repos/$REPO/deployments?environment=github-pages&per_page=10" \
            --jq '{deployments: [.[] | {id,sha,ref,created_at,updated_at,environment}]}' \
            > .review-deployment-inspection.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .review-ci-inspection.json .review-deployment-inspection.json
          git commit -m "Record Loomwright release state" || exit 0
          git push origin HEAD:main

name: Inspect final review patch application

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/inspect-review-ci.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Capture workflow state
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/actions/runs?per_page=30" \
            --jq '{runs: [.workflow_runs[] | select(.name == "Apply final review compatibility patch" or .name == "Review Identity CI") | {id,name,status,conclusion,head_branch,head_sha,created_at,updated_at,html_url}]}' \
            > .review-ci-inspection.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .review-ci-inspection.json
          git commit -m "Record final review patch workflow state" || exit 0
          git push origin HEAD:main

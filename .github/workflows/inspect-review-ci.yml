name: Inspect final review patch failure

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/inspect-review-ci.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Capture apply failure tail
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          JOB_ID: "86669734893"
        run: |
          gh api "repos/$REPO/actions/jobs/$JOB_ID/logs" > /tmp/apply.log
          tail -n 80 /tmp/apply.log > .review-apply-failure.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .review-apply-failure.txt
          git commit -m "Record final review patch apply failure" || exit 0
          git push origin HEAD:main

name: Verify live Loomwright release

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/inspect-review-ci.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  deployments: read

jobs:
  verify-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Verify source, deployment and live manifest
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RELEASE_RUN_ID: "29201245976"
        run: |
          set -euo pipefail
          SOURCE_SHA=$(gh api "repos/$REPO/git/ref/heads/agent/review-identity-resolution" --jq '.object.sha')
          DEPLOYMENT_ID=$(gh api "repos/$REPO/deployments?environment=github-pages&per_page=20" --jq 'map(select(.ref == "main")) | sort_by(.created_at) | reverse | .[0].id')
          gh api "repos/$REPO/deployments/$DEPLOYMENT_ID/statuses" > /tmp/statuses.json
          LIVE=$(curl --fail --location --retry 8 --retry-delay 3 --max-time 30 "https://drdoback06.github.io/Loomwright-V2/deployed-version.json")
          python - <<'PY'
          import json, os
          from pathlib import Path
          live = json.loads(os.environ['LIVE'])
          statuses = json.loads(Path('/tmp/statuses.json').read_text())
          result = {
              'sourceSha': os.environ['SOURCE_SHA'],
              'releaseRunId': int(os.environ['RELEASE_RUN_ID']),
              'deploymentId': int(os.environ['DEPLOYMENT_ID']),
              'deploymentState': statuses[0]['state'] if statuses else None,
              'deploymentEnvironmentUrl': statuses[0].get('environment_url') if statuses else None,
              'liveManifest': live,
          }
          assert result['deploymentState'] == 'success', result
          assert live['application'] == 'loomwright-review-identity-resolution', live
          assert live['sourceSha'] == result['sourceSha'], result
          Path('.loomwright-live-release.json').write_text(json.dumps(result, indent=2) + '\n')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .loomwright-live-release.json
          git commit -m "Verify live Loomwright identity release" || exit 0
          git push origin HEAD:main

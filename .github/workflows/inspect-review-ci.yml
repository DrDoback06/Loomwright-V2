name: Inspect Pages deployment failure

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/inspect-review-ci.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  deployments: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Capture Pages failure details
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: "29201028705"
        run: |
          gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" > .review-release-jobs.json
          gh api "repos/$REPO/actions/runs/$RUN_ID/artifacts" > .review-release-artifacts.json
          gh api "repos/$REPO/deployments?environment=github-pages&per_page=20" > .review-release-deployments.json
          gh api "repos/$REPO/environments/github-pages" > .review-pages-environment.json || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .review-release-jobs.json .review-release-artifacts.json .review-release-deployments.json .review-pages-environment.json
          git commit -m "Record Pages deployment failure details" || exit 0
          git push origin HEAD:main

name: Clean Loomwright release diagnostics

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/inspect-review-ci.yml

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Remove temporary release tooling
        run: |
          rm -f \
            .github/workflows/apply-review-payload.yml \
            .github/workflows/export-review-source.yml \
            .github/workflows/inspect-review-ci.yml \
            .review-ci-inspection.json \
            .review-ci-failure.txt \
            .review-compiler-errors.txt \
            .review-apply-failure.txt \
            .review-deployment-inspection.json \
            .review-release-jobs.json \
            .review-release-artifacts.json \
            .review-release-deployments.json \
            .review-pages-environment.json \
            .loomwright-review-source.json \
            .loomwright-review-source-final.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean temporary Loomwright release diagnostics" || exit 0
          git push origin HEAD:main

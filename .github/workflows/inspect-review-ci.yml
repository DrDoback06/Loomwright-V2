name: Inspect final review compiler errors

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/inspect-review-ci.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Capture compiler errors
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          JOB_ID: "86671008515"
        run: |
          gh api "repos/$REPO/actions/jobs/$JOB_ID/logs" > /tmp/review.log
          grep -nE 'error TS|Type error|SyntaxError|error:' /tmp/review.log | tail -n 120 > .review-compiler-errors.txt || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .review-compiler-errors.txt
          git commit -m "Record final review compiler errors" || exit 0
          git push origin HEAD:main

name: Inspect latest review identity CI

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/inspect-review-ci.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Capture latest review CI state
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/$REPO/actions/runs?branch=agent/review-identity-resolution&per_page=20" \
            --jq '{runs: [.workflow_runs[] | select(.name == "Review Identity CI") | {id, status, conclusion, head_sha, created_at, updated_at, html_url}]}' \
            > .review-ci-inspection.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .review-ci-inspection.json
          git commit -m "Record latest review identity CI state" || exit 0
          git push origin HEAD:main

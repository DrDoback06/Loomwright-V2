name: Inspect Loomwright release failures

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/inspect-review-ci.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Capture browser failure summary
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          JOB_ID: "86671695299"
        run: |
          gh api "repos/$REPO/actions/jobs/$JOB_ID/logs" > /tmp/release.log
          python - <<'PY'
          from pathlib import Path
          lines = Path('/tmp/release.log').read_text(encoding='utf-8', errors='replace').splitlines()
          hits = []
          used = set()
          needles = ('##[notice]', '##[error]', 'failed', 'timeout', 'strict mode violation', 'locator:', 'error: expect', 'error: locator')
          for index, line in enumerate(lines):
              if any(needle.lower() in line.lower() for needle in needles):
                  for pos in range(max(0, index - 5), min(len(lines), index + 24)):
                      if pos not in used:
                          used.add(pos)
                          hits.append((pos, lines[pos]))
          hits.sort()
          Path('.review-ci-failure.txt').write_text(
              '\n'.join(f'{pos + 1}: {line}' for pos, line in hits[-1800:]) + '\n',
              encoding='utf-8',
          )
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .review-ci-failure.txt
          git commit -m "Record Loomwright release browser failures" || exit 0
          git push origin HEAD:main

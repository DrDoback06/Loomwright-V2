name: Apply nuanced extraction interpretation

on:
  push:
    branches:
      - agent/review-identity-resolution
    paths:
      - .github/workflows/apply-ambiguous-extraction.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/review-identity-resolution
          fetch-depth: 1
      - name: Apply deterministic patch
        run: python tools/apply-ambiguous-extraction.py
      - name: Commit nuanced extraction model
        run: |
          rm -f tools/apply-ambiguous-extraction.py .github/workflows/apply-ambiguous-extraction.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Preserve ambiguous entities with editable type suggestions"
          git push origin HEAD:agent/review-identity-resolution
